# ════════════════════════════════════════════════════════════════
#  NotiqAI — CI: build & push 4 production images to GHCR.
#
#  Triggers:
#    • push to main  → rebuild + push with :latest and :<sha> tags
#    • pull_request  → build only (no push, validates Dockerfile)
#    • workflow_dispatch → manual build (any branch)
#
#  Images produced (all linux/amd64):
#    ghcr.io/setdarovdev/najot-nur-backend:latest
#    ghcr.io/setdarovdev/najot-nur-admin:latest
#    ghcr.io/setdarovdev/najot-nur-curator:latest
#    ghcr.io/setdarovdev/najot-nur-landing:latest
#
#  Dokploy watches these tags and redeploys on change.
# ════════════════════════════════════════════════════════════════

name: build

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: setdarovdev
  IMAGE_PREFIX: najot-nur
  PLATFORMS: linux/amd64

permissions:
  contents: read
  packages: write

jobs:
  # ─────────────────────────────────────────────────────────────
  #  Build each image in parallel. Cache is shared via GHA cache.
  # ─────────────────────────────────────────────────────────────
  build:
    name: ${{ matrix.service.name }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - service:
              name: backend
              context: ./backend
              dockerfile: Dockerfile.prod
              build_args: ""
          - service:
              name: admin
              context: ./admin
              dockerfile: Dockerfile.prod
              build_args: |
                VITE_API_URL=/api/v1
                VITE_EXPECTED_HOST=admin.notiqlik.uz
          - service:
              name: curator
              context: ./curator
              dockerfile: Dockerfile.prod
              build_args: |
                VITE_API_URL=/api/v1
                VITE_EXPECTED_HOST=curator.notiqlik.uz
          - service:
              name: landing
              context: ./landing
              dockerfile: Dockerfile.prod
              build_args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # QEMU olib tashlandi: biz faqat linux/amd64 quramiz va runner ham
      # amd64. Emulyatsiya kerak emas — u faqat build'ni sekinlashtiradi.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYYMMDD-HHmmss'}}
          flavor: latest=auto

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.context }}/${{ matrix.service.dockerfile }}
          platforms: ${{ env.PLATFORMS }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,scope=${{ matrix.service.name }},mode=max,ignore-error=true
          build-args: ${{ matrix.service.build_args }}
          provenance: false

  # ─────────────────────────────────────────────────────────────
  #  Deploy to production via SSH.
  #  Runs only on push to main (not PRs), after all 4 images
  #  are built and pushed to GHCR.
  #
  #  Required GitHub secrets (Settings → Secrets → Actions):
  #    SSH_HOST         = 45.138.159.219
  #    SSH_USER         = root
  #    SSH_KEY          = <private key contents, no passphrase>
  #    SSH_KNOWN_HOSTS  = <output of: ssh-keyscan 45.138.159.219>
  #    DEPLOY_DIR       = /opt/notiqai
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to production
    runs-on: ubuntu-22.04
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://notiqlik.uz

    steps:
      - name: "Debug: list received secrets names (no values)"
        run: |
          echo "HOST='${{ secrets.SSH_HOST }}'"
          echo "USER='${{ secrets.SSH_USER }}'"
          echo "KEY length=${#SSH_KEY_PLACEHOLDER}"
          [ -n "${{ secrets.SSH_HOST }}" ] && echo "✓ SSH_HOST set" || echo "✗ SSH_HOST MISSING"
          [ -n "${{ secrets.SSH_USER }}" ] && echo "✓ SSH_USER set" || echo "✗ SSH_USER MISSING"
          [ -n "${{ secrets.SSH_KEY }}" ] && echo "✓ SSH_KEY set" || echo "✗ SSH_KEY MISSING"
          [ -n "${{ secrets.SSH_KNOWN_HOSTS }}" ] && echo "✓ SSH_KNOWN_HOSTS set" || echo "✗ SSH_KNOWN_HOSTS MISSING"
        env:
          SSH_KEY_PLACEHOLDER: ${{ secrets.SSH_KEY }}

      - name: Setup SSH key & known_hosts
        run: |
          mkdir -p /home/runner/.ssh
          printf '%s\n' "$SSH_KEY" > /home/runner/.ssh/deploy_key
          chmod 600 /home/runner/.ssh/deploy_key
          printf '%s\n' "$KNOWN_HOSTS" > /home/runner/.ssh/known_hosts
          chmod 644 /home/runner/.ssh/known_hosts
          echo "✓ files written"
          ls -la /home/runner/.ssh/
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          HOME: /home/runner
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key_path: /home/runner/.ssh/deploy_key
          command_timeout: 20m
          script: |
            set -uo pipefail
            cd /opt/notiqai

            echo "▶ Git pull (config/Caddyfile changes)..."
            git pull --ff-only origin main

            # Image'larni oldindan tortamiz. ghcr.io ba'zan TLS handshake
            # timeout beradi (server↔ghcr tarmog'i flaky) — shuning uchun
            # retry bilan o'raymiz. Tortilgan image'lar cache'da qoladi, shu
            # bois qayta urinish faqat uzilgan image'ni tortadi (tez).
            echo "▶ Image lar GHCR dan tortilmoqda (retry bilan)..."
            pull_ok=0
            for attempt in 1 2 3 4; do
              echo "  ▶ pull urinish ${attempt}/4..."
              if timeout 6m docker compose pull; then
                pull_ok=1
                break
              fi
              if [ "$attempt" -lt 4 ]; then
                wait_s=$((attempt * 15))
                echo "  ⚠ urinish ${attempt} muvaffaqiyatsiz (ghcr.io TLS/tarmoq flaky). ${wait_s}s kutib qayta urinamiz..." >&2
                sleep "$wait_s"
              fi
            done
            if [ "$pull_ok" -ne 1 ]; then
              echo "✗ docker compose pull 4 urinishdan keyin ham muvaffaqiyatsiz (ghcr.io tarmoq muammosi)." >&2
              exit 1
            fi

            # Konteynerlarni qayta yaratamiz. depends_on: service_healthy sabab
            # `up -d` sog'lomlikni kutadi — biror servis sog'lom bo'lolmasa
            # cheksiz osilmasligi uchun `timeout` bilan chegaralaymiz.
            echo "▶ Konteynerlar qayta yaratilmoqda (maks 6 min)..."
            if ! timeout 6m docker compose up -d --remove-orphans; then
              echo "⚠ up -d 6 min ichida tugamadi — sog'lom bo'lmagan servis loglari:" >&2
              for svc in backend admin curator landing nginx; do
                if [ "$(docker inspect -f '{{.State.Health.Status}}' "notiq_${svc}" 2>/dev/null)" != "healthy" ]; then
                  echo "──── $svc (oxirgi 40 qator) ────" >&2
                  docker compose logs --tail 40 "$svc" 2>&1 | sed 's/^/    /' >&2
                fi
              done
              exit 1
            fi

            echo "▶ Nginx reload (config o'zgargan bo'lsa)..."
            docker compose exec -T nginx nginx -s reload 2>/dev/null || true

            echo "▶ Caddy reload (config o'zgargan bo'lsa)..."
            docker compose exec -T caddy caddy reload --config /etc/caddy/Caddyfile 2>/dev/null || true

            echo "▶ Domenlar tekshirilmoqda..."
            for domain in admin.notiqlik.uz curator.notiqlik.uz notiqlik.uz api.notiqlik.uz; do
              status=$(curl -sk --max-time 10 -o /dev/null -w "%{http_code}" "https://$domain" 2>/dev/null || echo "000")
              echo "  $domain → HTTP $status"
              if [ "$status" = "000" ] || [ "$status" -ge "500" ]; then
                echo "  ⚠ $domain not responding correctly"
              fi
            done

            echo "▶ Eski imagelar tozalanmoqda..."
            docker image prune -f

            echo "▶ Running containers:"
            docker compose ps

            echo "✓ Deploy yakunlandi."
