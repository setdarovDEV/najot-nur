# ════════════════════════════════════════════════════════════════
#  NotiqAI — CI: build & push 4 production images to GHCR.
#
#  Triggers:
#    • push to main  → rebuild + push with :latest and :<sha> tags
#    • pull_request  → build only (no push, validates Dockerfile)
#    • workflow_dispatch → manual build (any branch)
#
#  Images produced (all linux/amd64):
#    ghcr.io/setdarovdev/najot-nur-backend:latest
#    ghcr.io/setdarovdev/najot-nur-admin:latest
#    ghcr.io/setdarovdev/najot-nur-curator:latest
#    ghcr.io/setdarovdev/najot-nur-landing:latest
#
#  Dokploy watches these tags and redeploys on change.
# ════════════════════════════════════════════════════════════════

name: build

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: setdarovdev
  IMAGE_PREFIX: najot-nur
  PLATFORMS: linux/amd64

permissions:
  contents: read
  packages: write

jobs:
  # ─────────────────────────────────────────────────────────────
  #  Build each image in parallel. Cache is shared via GHA cache.
  # ─────────────────────────────────────────────────────────────
  build:
    name: ${{ matrix.service.name }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: { name: backend,  context: ./backend,  dockerfile: Dockerfile.prod, build_args: "" }
          - service: { name: admin,    context: ./admin,    dockerfile: Dockerfile.prod, build_args: "VITE_API_URL=/api/v1" }
          - service: { name: curator,  context: ./curator,  dockerfile: Dockerfile.prod, build_args: "VITE_API_URL=/api/v1" }
          - service: { name: landing,  context: ./landing,  dockerfile: Dockerfile.prod, build_args: "" }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYYMMDD-HHmmss'}}
          flavor: latest=auto

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.context }}/${{ matrix.service.dockerfile }}
          platforms: ${{ env.PLATFORMS }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,scope=${{ matrix.service.name }},mode=max
          build-args: ${{ matrix.service.build_args }}
          provenance: false

  # ─────────────────────────────────────────────────────────────
  #  Deploy to production via SSH.
  #  Runs only on push to main (not PRs), after all 4 images
  #  are built and pushed to GHCR.
  #
  #  Required GitHub secrets (Settings → Secrets → Actions):
  #    SSH_HOST         = 45.138.159.219
  #    SSH_USER         = root
  #    SSH_KEY          = <private key contents, no passphrase>
  #    SSH_KNOWN_HOSTS  = <output of: ssh-keyscan 45.138.159.219>
  #    DEPLOY_DIR       = /opt/notiqai
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to production
    runs-on: ubuntu-22.04
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://notiqlik.uz

    steps:
      - name: Write known_hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          known_hosts: ~/.ssh/known_hosts
          command_timeout: 10m
          script: |
            set -euo pipefail
            cd /opt/notiqai

            echo "▶ Git pull (config/Caddyfile changes)..."
            git pull --ff-only origin main

            echo "▶ Image lar GHCR dan tortilmoqda..."
            docker compose pull

            echo "▶ Konteynerlar qayta yaratilmoqda..."
            docker compose up -d

            echo "▶ Caddy reload (config o'zgargan bo'lsa)..."
            docker compose exec -T caddy caddy reload --config /etc/caddy/Caddyfile || true

            echo "▶ Eski imagelar tozalanmoqda..."
            docker image prune -f

            echo "▶ Running containers:"
            docker compose ps

            echo "✓ Deploy yakunlandi."
