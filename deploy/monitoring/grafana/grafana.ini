[paths]
provisioning = /etc/grafana/provisioning

[server]
root_url = https://grafana.notiqlik.uz/

[security]
admin_user = ${GF_ADMIN_USER:-admin}
admin_password = ${GF_ADMIN_PASSWORD:-notiqai_grafana}
disable_gravatar = true
cookie_secure = true
cookie_samesite = lax

[users]
allow_sign_up = false
allow_org_create = false

[auth.anonymous]
enabled = false

[dashboards]
default_home_dashboard_path = /var/lib/grafana/dashboards/backend-overview.json

[log]
mode = console
level = warn

[log.console]
format = json

[analytics]
reporting_enabled = false
check_for_updates = false
check_for_plugin_updates = false

[feature_toggles]
enable = traceToMetrics
