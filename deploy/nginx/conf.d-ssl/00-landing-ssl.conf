# ════════════════════════════════════════════════════════════════
#  notiqlik.uz / www.notiqlik.uz — landing (HTTPS)
#  Loaded by setup-https.sh AFTER DNS + certs are ready.
# ════════════════════════════════════════════════════════════════
server {
    listen 80;
    server_name notiqlik.uz www.notiqlik.uz;
    location /.well-known/acme-challenge/ { root /var/www/certbot; } location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    server_name notiqlik.uz www.notiqlik.uz;

    ssl_certificate     /etc/letsencrypt/live/notiqai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/notiqai/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/notiqai/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    root /var/www/landing;
    index index.html;

    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff2?|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /healthz {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
