# ════════════════════════════════════════════════════════════════
#  dokploy.notiqlik.uz — Dokploy panel (HTTPS)
#  Loaded by setup-https.sh AFTER DNS + certs are ready.
# ════════════════════════════════════════════════════════════════
server {
    listen 80;
    server_name dokploy.notiqlik.uz;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    server_name dokploy.notiqlik.uz;

    # Multi-domain cert (notiqai) — same cert covers all *.notiqlik.uz
    # domains because they share the SAN list. See init-letsencrypt.sh.
    ssl_certificate     /etc/letsencrypt/live/notiqai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/notiqai/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/notiqai/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Dokploy uploads can be big (docker images, git repos, backups).
    client_max_body_size 500M;

    # Health probe (bypasses proxy, useful for uptime monitoring).
    location = /healthz {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Certbot challenge (just in case renew happens before HTTP block is
    # copied to conf.d/).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Dokploy panel itself.
    location / {
        proxy_pass http://notiq_dokploy;
        proxy_http_version 1.1;

        # WebSocket support (Dokploy real-time updates).
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # Long-lived connections (WebSocket).
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_connect_timeout 60s;

        # Don't buffer streamed responses or large uploads.
        proxy_buffering     off;
        proxy_request_buffering off;
    }
}
