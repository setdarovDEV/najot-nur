# ════════════════════════════════════════════════════════════════
#  dokploy.notiqlik.uz — Dokploy panel (reverse proxy to port 3000)
#
#  Dokploy is hosted on the same machine, listening on :3000.
#  nginx proxies through host.docker.internal (added via
#  `extra_hosts: ["host.docker.internal:host-gateway"]` in
#  docker-compose.deploy.yml).
#
#  WebSocket support: enabled (Dokploy uses WS for live updates).
#  Large body: 500M (Dokploy uploads can include project archives).
# ════════════════════════════════════════════════════════════════
server {
    listen 80;
    server_name dokploy.notiqlik.uz;

    # Let's Encrypt ACME challenge.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Health probe (skips HTTPS redirect, easy to curl from the host).
    location = /healthz {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Everything else → HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}
