# ════════════════════════════════════════════════════════════════
#  admin.notiqlik.uz — admin SPA (React + Vite)
# ════════════════════════════════════════════════════════════════
server {
    listen 80;
    server_name admin.notiqlik.uz;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # The SPA uses a relative VITE_API_URL (/api/v1) so the API is requested
    # on the same origin. Proxy those calls to the backend so the SPA's
    # static server doesn't return 405 for POST /api/v1/auth/login.
    location /api/ {
        proxy_pass http://notiq_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_read_timeout 120s;
    }

    # WebSocket for support chat (only admin has this page).
    location ~ ^/(api/v1/)?support/ws {
        rewrite ^/support/ws(.*)$ /api/v1/support/ws$1 break;
        proxy_pass http://notiq_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    location / {
        proxy_pass http://notiq_admin;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_read_timeout 60s;
    }
}
