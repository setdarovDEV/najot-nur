# ════════════════════════════════════════════════════════════════
#  api.notiqlik.uz — backend API (FastAPI behind gunicorn)
# ════════════════════════════════════════════════════════════════
server {
    listen 80;
    server_name api.notiqlik.uz;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "DENY" always;
    add_header Referrer-Policy        "no-referrer" always;

    client_max_body_size 64M;

    # Global rate limit for API
    limit_req zone=api_limit burst=60 nodelay;

    # Health probe (unlimited, no log noise)
    location = /health {
        proxy_pass http://notiq_backend/health;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    # Stricter limit for auth endpoints
    location ~ ^/api/v1/auth/ {
        limit_req zone=login_limit burst=5 nodelay;
        proxy_pass http://notiq_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OpenAPI / Swagger UI
    location ~ ^/(docs|redoc|openapi.json)$ {
        proxy_pass http://notiq_backend$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # User-uploaded media (mounted from the `media` shared volume)
    location /media/ {
        alias /var/www/media/;
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # WebSocket for support chat
    location ~ ^/(api/v1/)?support/ws {
        rewrite ^/support/ws(.*)$ /api/v1/support/ws$1 break;
        proxy_pass http://notiq_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # Everything else → FastAPI
    location / {
        proxy_pass http://notiq_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
