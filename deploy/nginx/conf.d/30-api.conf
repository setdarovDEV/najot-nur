# ════════════════════════════════════════════════════════════════
#  api.notiqlik.uz — backend API (FastAPI)
# ════════════════════════════════════════════════════════════════
server {
    listen 80;
    server_name api.notiqlik.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name api.notiqlik.uz;

    ssl_certificate     /etc/letsencrypt/live/api.notiqlik.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.notiqlik.uz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "DENY" always;
    add_header Referrer-Policy        "no-referrer" always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    client_max_body_size 64M;

    # Global rate limit
    limit_req zone=api_limit burst=60 nodelay;

    # Health probe
    location = /health {
        proxy_pass http://notiq_backend/health;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    # Stricter limit for login
    location ~ ^/api/v1/auth/ {
        limit_req zone=login_limit burst=5 nodelay;
        proxy_pass http://notiq_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OpenAPI / Swagger UI
    location ~ ^/(docs|redoc|openapi.json)$ {
        proxy_pass http://notiq_backend$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # User media — backed by shared volume
    location /media/ {
        alias /var/www/media/;
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # WebSocket for support chat
    location ~ ^/(api/v1/)?support/ws {
        rewrite ^/support/ws(.*)$ /api/v1/support/ws$1 break;
        proxy_pass http://notiq_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # Everything else → FastAPI
    location / {
        proxy_pass http://notiq_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
