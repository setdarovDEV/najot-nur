# ════════════════════════════════════════════════════════════════
#  Catch-all — block any host that isn't in the known list.
#  Prevents random Host headers from reaching internal services.
#  Still allows the docker healthcheck (no Host header / 127.0.0.1).
# ════════════════════════════════════════════════════════════════
server {
    listen 80 default_server;
    server_name _;

    # Docker healthcheck runs `wget http://127.0.0.1/healthz` —
    # its Host header is `127.0.0.1` which doesn't match any
    # of the real server blocks. Without this, it would fall
    # through to `return 444` and mark the container unhealthy.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Everything else → connection closed silently.
    location / {
        return 444;
    }
}
