user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  2048;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'rt=$request_time uct="$upstream_connect_time" '
                      'uht="$upstream_header_time" urt="$upstream_response_time"';

    log_format  json  '{'
                      '"time":"$time_iso8601",'
                      '"remote_addr":"$remote_addr",'
                      '"request":"$request",'
                      '"status":$status,'
                      '"body_bytes_sent":$body_bytes_sent,'
                      '"request_time":$request_time,'
                      '"http_referer":"$http_referer",'
                      '"http_user_agent":"$http_user_agent"'
                      '}';

    access_log  /var/log/nginx/access.log  json;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    server_tokens   off;
    client_max_body_size 64M;

    set_real_ip_from 172.16.0.0/12;
    real_ip_header X-Real-IP;

    server_names_hash_bucket_size 128;

    resolver 127.0.0.11 valid=2s ipv6=off;

    gzip  on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/x-javascript
        image/svg+xml;

    # ─────────────────────────────────────────────────────────────
    #  Security headers (applied to all server blocks)
    # ─────────────────────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ─────────────────────────────────────────────────────────────
    #  Rate-limit zones (per-IP)
    # ─────────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=30r/s;
    limit_req_zone $binary_remote_addr zone=login_limit:1m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=ai_limit:10m   rate=10r/m;
    limit_conn_status 429;

    # ─────────────────────────────────────────────────────────────
    #  Upstreams
    # ─────────────────────────────────────────────────────────────
    upstream notiq_backend { zone notiq_backend 64k; server backend:8000 resolve; keepalive 16; }
    upstream notiq_admin   { zone notiq_admin 64k;   server admin:80 resolve;     keepalive 16; }
    upstream notiq_curator { zone notiq_curator 64k; server curator:80 resolve;   keepalive 16; }
    upstream notiq_landing { zone notiq_landing 64k; server landing:80 resolve;   keepalive 16; }

    include /etc/nginx/conf.d/*.conf;
}
