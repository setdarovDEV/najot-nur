user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  2048;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'rt=$request_time uct="$upstream_connect_time" '
                      'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    server_tokens   off;
    client_max_body_size 64M;

    # Long .uz subdomains need a bigger hash bucket (default 32 is too small).
    server_names_hash_bucket_size 128;

    gzip  on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/x-javascript
        image/svg+xml;

    # ─────────────────────────────────────────────────────────────
    #  Upstreams — one per backend/frontend
    # ─────────────────────────────────────────────────────────────
    upstream notiq_backend { server backend:8000; keepalive 16; }
    upstream notiq_admin   { server admin:80;     keepalive 16; }
    upstream notiq_curator { server curator:80;   keepalive 16; }
    upstream notiq_landing { server landing:80;   keepalive 16; }

    # ─────────────────────────────────────────────────────────────
    #  Rate-limit zones (per-IP)
    # ─────────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=30r/s;
    limit_req_zone $binary_remote_addr zone=login_limit:1m rate=5r/m;
    limit_conn_status 429;

    include /etc/nginx/conf.d/*.conf;
}
