# ════════════════════════════════════════════════════════════════
#  NotiqAI — PRODUCTION override
#  Usage:  docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
# ════════════════════════════════════════════════════════════════
services:
  postgres:
    restart: always
    # do not expose DB port on host (override base's ports:)
    ports: []
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-notiq} -d ${POSTGRES_DB:-notiqai}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 384M

  redis:
    restart: always
    # do not expose Redis on host (override base's ports:)
    ports: []
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 192M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: notiq_backend
    restart: always
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-notiq}:${POSTGRES_PASSWORD:-notiq}@postgres:5432/${POSTGRES_DB:-notiqai}
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
      DEBUG: "false"
    # NO bind-mount in prod — code lives inside the image
    volumes:
      - media:/app/media
    # remove host port from base compose; nginx proxies to backend
    ports: []
    expose:
      - "8000"
    # Override dev command (uvicorn --reload) with gunicorn workers
    command:
      - sh
      - -c
      - >
        alembic upgrade heads &&
        exec gunicorn app.main:app
        -k uvicorn.workers.UvicornWorker
        -b 0.0.0.0:8000
        --workers 1
        --timeout 60
        --graceful-timeout 30
        --access-logfile -
        --error-logfile -
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL_ADMIN:-/api/v1}
    container_name: notiq_admin
    restart: always
    # remove host port from base compose; nginx proxies to admin
    ports: []
    expose:
      - "80"
    # Override dev command (vite dev) with nginx (set in Dockerfile.prod)
    command: ["nginx", "-g", "daemon off;"]
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 64M

  curator:
    build:
      context: ./curator
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL_CURATOR:-/api/v1}
    container_name: notiq_curator
    restart: always
    ports: []
    expose:
      - "80"
    command: ["nginx", "-g", "daemon off;"]
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 64M

  landing:
    build:
      context: ./landing
      dockerfile: Dockerfile.prod
    container_name: notiq_landing
    restart: always
    ports: []
    expose:
      - "80"
    command: ["nginx", "-g", "daemon off;"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 32M

  nginx:
    image: nginx:1.27-alpine
    container_name: notiq_nginx
    restart: always
    depends_on:
      backend:
        condition: service_healthy
      admin:
        condition: service_healthy
      curator:
        condition: service_healthy
      landing:
        condition: service_healthy
    ports:
      - target: 80
        published: 80
        protocol: tcp
      - target: 443
        published: 443
        protocol: tcp
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./deploy/nginx/certbot/www:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - media:/var/www/media:ro
      - nginx-cache:/var/cache/nginx
      - nginx-logs:/var/log/nginx
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 32M

volumes:
  postgres-data:
  redis-data:
  media:
  nginx-cache:
  nginx-logs:
