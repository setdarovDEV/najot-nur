# ════════════════════════════════════════════════════════════════
#  NotiqAI — PRODUCTION compose (Dokploy-ready, single file).
#
#  Architecture:
#    ┌──────────────────────────────┐
#    │  Dokploy Traefik (SSL off)   │  ← terminatsiya HTTPS
#    └──────────────┬───────────────┘
#                   │  http://nginx:80
#    ┌──────────────▼───────────────┐
#    │  nginx (HTTP, Host routing)  │  ← ushbu compose
#    └─┬─────┬─────┬─────┬──────────┘
#      │     │     │     │
#   landing admin curator  │
#                          │
#                  ┌───────▼──────┐
#                  │   backend    │
#                  └──────────────┘
#
#  Public entry: ONE container (nginx:80) — Dokploy routes ALL
#  subdomains to it via Traefik labels; nginx picks the right
#  upstream by the `Host` header.
#
#  Quick start:
#    1. Paste this file in Dokploy → New → Compose
#    2. In Dokploy's "Domains" tab add 4 hostnames, ALL pointing
#       to the `nginx` service on port 80 (see deploy/dokploy/README.md)
#    3. Fill .env (copy from .env.production.example)
#    4. Deploy. Traefik issues Let's Encrypt certs automatically.
# ════════════════════════════════════════════════════════════════

name: notiqai

services:
  # ─────────────────────────────────────────────────────────────
  #  PostgreSQL — primary database
  # ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: notiq_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-notiq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-notiqai}
      PGDATA: /var/lib/postgresql/data/pgdata
    expose:
      - "5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-notiq} -d ${POSTGRES_DB:-notiqai}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 384M
    networks:
      - notiq

  # ─────────────────────────────────────────────────────────────
  #  Redis — cache + rate-limit store
  # ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: notiq_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "192mb", "--maxmemory-policy", "allkeys-lru"]
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 192M
    networks:
      - notiq

  # ─────────────────────────────────────────────────────────────
  #  Backend — FastAPI + gunicorn
  # ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    image: notiqai-backend:latest
    container_name: notiq_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-notiq}:${POSTGRES_PASSWORD:?required}@postgres:5432/${POSTGRES_DB:-notiqai}
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
      DEBUG: "false"
      LOCAL_MEDIA_DIR: /app/media
    expose:
      - "8000"
    volumes:
      - media:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    command:
      - sh
      - -c
      - |
        set -e
        echo "▶ Running alembic migrations…"
        alembic upgrade heads
        if [ "$${RUN_SEEDS:-false}" = "true" ]; then
          echo "▶ Seeding initial data (idempotent)…"
          python -m app.seeds.seed || echo "  seed exited with non-zero, continuing"
        fi
        echo "▶ Starting gunicorn with $${WEB_CONCURRENCY:-2} workers…"
        exec gunicorn app.main:app \
          -k uvicorn.workers.UvicornWorker \
          -b 0.0.0.0:8000 \
          --workers $${WEB_CONCURRENCY:-2} \
          --timeout 60 \
          --graceful-timeout 30 \
          --access-logfile - \
          --error-logfile -
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - notiq

  # ─────────────────────────────────────────────────────────────
  #  Admin SPA — React + Vite, served by an internal nginx
  # ─────────────────────────────────────────────────────────────
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL_ADMIN:-/api/v1}
    image: notiqai-admin:latest
    container_name: notiq_admin
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - notiq

  # ─────────────────────────────────────────────────────────────
  #  Curator SPA — React + Vite
  # ─────────────────────────────────────────────────────────────
  curator:
    build:
      context: ./curator
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL_CURATOR:-/api/v1}
    image: notiqai-curator:latest
    container_name: notiq_curator
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - notiq

  # ─────────────────────────────────────────────────────────────
  #  Landing SPA — public marketing page
  # ─────────────────────────────────────────────────────────────
  landing:
    build:
      context: ./landing
      dockerfile: Dockerfile.prod
    image: notiqai-landing:latest
    container_name: notiq_landing
    restart: unless-stopped
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 32M
    networks:
      - notiq

  # ─────────────────────────────────────────────────────────────
  #  Nginx — single public entry point.
  #  Listens ONLY on :80 (HTTP). Dokploy Traefik terminates HTTPS
  #  in front of us, so nginx does NOT need ssl_certificate files.
  #
  #  All 4 subdomains from Dokploy point to THIS service.
  #  Routing is by `Host` header → correct upstream container.
  # ─────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: notiq_nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      admin:
        condition: service_healthy
      curator:
        condition: service_healthy
      landing:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - media:/var/www/media:ro
      - nginx-cache:/var/cache/nginx
      - nginx-logs:/var/log/nginx
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - notiq

volumes:
  postgres-data:
  redis-data:
  media:
  nginx-cache:
  nginx-logs:

networks:
  notiq:
    driver: bridge
