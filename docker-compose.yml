# ════════════════════════════════════════════════════════════════
#  NotiqAI — PRODUCTION compose (Caddy + auto-deploy).
#
#  Architecture:
#    ┌──────────────────────────────┐
#    │  Caddy (auto-HTTPS)         │  ← Let's Encrypt certs
#    └──────────────┬───────────────┘
#                   │  http://nginx:80 (internal)
#    ┌──────────────▼───────────────┐
#    │  nginx (HTTP, Host routing)  │  ← ushbu compose
#    └─┬─────┬─────┬─────┬──────────┘
#      │     │     │     │
#   landing admin curator  │
#                          │
#                  ┌───────▼──────┐
#                  │   backend    │
#                  └──────────────┘
#
#  Auto-deploy: Watchtower watches GHCR for new images and
#  restarts containers (except caddy, which is pinned).
#
#  How to deploy a new version:
#    git push origin main
#    → GH Actions builds 4 images
#    → Watchtower (5 min) pulls new images, restarts containers
#    → Users see new version
#
#  This file does NOT use `build:`. Images are prebuilt by
#  GitHub Actions (.github/workflows/build.yml) and pulled from
#  ghcr.io/setdarovdev/najot-nur-*.
# ════════════════════════════════════════════════════════════════

name: notiqai

services:
  # ─────────────────────────────────────────────────────────────
  #  PostgreSQL — primary database
  # ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: notiq_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-notiq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-notiqai}
      PGDATA: /var/lib/postgresql/data/pgdata
    expose:
      - "5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-notiq} -d ${POSTGRES_DB:-notiqai}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 384M
    networks:
      - notiq
    labels:
      com.centurylinklabs.watchtower.enable: "true"

  # ─────────────────────────────────────────────────────────────
  #  Redis — cache + rate-limit store
  # ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: notiq_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "192mb", "--maxmemory-policy", "allkeys-lru"]
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 192M
    networks:
      - notiq
    labels:
      com.centurylinklabs.watchtower.enable: "true"

  # ─────────────────────────────────────────────────────────────
  #  Backend — FastAPI + gunicorn (prebuilt image from GHCR)
  # ─────────────────────────────────────────────────────────────
  backend:
    image: ghcr.io/setdarovdev/najot-nur-backend:${IMAGE_TAG:-latest}
    container_name: notiq_backend
    restart: unless-stopped
    pull_policy: always
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-notiq}:${POSTGRES_PASSWORD:?required}@postgres:5432/${POSTGRES_DB:-notiqai}
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
      DEBUG: "false"
      LOCAL_MEDIA_DIR: /app/media
    expose:
      - "8000"
    volumes:
      - media:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - notiq
    labels:
      com.centurylinklabs.watchtower.enable: "true"

  # ─────────────────────────────────────────────────────────────
  #  Admin SPA — React + Vite (prebuilt image from GHCR)
  # ─────────────────────────────────────────────────────────────
  admin:
    image: ghcr.io/setdarovdev/najot-nur-admin:${IMAGE_TAG:-latest}
    container_name: notiq_admin
    restart: unless-stopped
    pull_policy: always
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - notiq
    labels:
      com.centurylinklabs.watchtower.enable: "true"

  # ─────────────────────────────────────────────────────────────
  #  Curator SPA — React + Vite (prebuilt image from GHCR)
  # ─────────────────────────────────────────────────────────────
  curator:
    image: ghcr.io/setdarovdev/najot-nur-curator:${IMAGE_TAG:-latest}
    container_name: notiq_curator
    restart: unless-stopped
    pull_policy: always
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - notiq
    labels:
      com.centurylinklabs.watchtower.enable: "true"

  # ─────────────────────────────────────────────────────────────
  #  Landing SPA — public marketing page (prebuilt image from GHCR)
  # ─────────────────────────────────────────────────────────────
  landing:
    image: ghcr.io/setdarovdev/najot-nur-landing:${IMAGE_TAG:-latest}
    container_name: notiq_landing
    restart: unless-stopped
    pull_policy: always
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 32M
    networks:
      - notiq
    labels:
      com.centurylinklabs.watchtower.enable: "true"

  # ─────────────────────────────────────────────────────────────
  #  Nginx — internal Host-based routing.
  #  Receives requests from Caddy (host:8080 → container:80) and
  #  forwards to the right service based on the Host header.
  #  NOT exposed to the public internet.
  # ─────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: notiq_nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      admin:
        condition: service_healthy
      curator:
        condition: service_healthy
      landing:
        condition: service_healthy
    ports:
      # Only the host can reach this (Caddy forwards here).
      - "127.0.0.1:8080:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - media:/var/www/media:ro
      - nginx-cache:/var/cache/nginx
      - nginx-logs:/var/log/nginx
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - notiq
    # nginx image is official, no need to update via watchtower
    labels:
      com.centurylinklabs.watchtower.enable: "false"

  # ─────────────────────────────────────────────────────────────
  #  Caddy — public entry point. Auto-HTTPS via Let's Encrypt.
  #  Listens on :80 and :443, forwards plain HTTP to nginx:8080
  #  on the host (which is nginx container's :80).
  # ─────────────────────────────────────────────────────────────
  caddy:
    image: caddy:2.8-alpine
    container_name: notiq_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data   # certs + ACME account
      - caddy_config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:2019/config/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - notiq
    # Pin caddy version, never auto-update
    labels:
      com.centurylinklabs.watchtower.enable: "false"

  # ─────────────────────────────────────────────────────────────
  #  Watchtower — auto-pulls new images and restarts containers.
  #  Polls GHCR every 5 minutes. Updates only containers with
  #  label `com.centurylinklabs.watchtower.enable: true`.
  # ─────────────────────────────────────────────────────────────
  watchtower:
    image: containrrr/watchtower:1.7
    container_name: notiq_watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: "300"
      WATCHTOWER_INCLUDE_STOPPED: "false"
      WATCHTOWER_REVIVE_STOPPED: "false"
      WATCHTOWER_ROLLING_RESTART: "true"
      WATCHTOWER_TIMEOUT: "60s"
    networks:
      - notiq
    # Don't update watchtower itself
    labels:
      com.centurylinklabs.watchtower.enable: "false"

volumes:
  postgres-data:
  redis-data:
  media:
  nginx-cache:
  nginx-logs:
  caddy_data:
  caddy_config:

networks:
  notiq:
    driver: bridge
