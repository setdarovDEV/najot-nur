# ════════════════════════════════════════════════════════════════
#  NotiqAI — PRODUCTION compose (Caddy + auto-deploy).
#
#  Architecture:
#    ┌──────────────────────────────┐
#    │  Caddy (auto-HTTPS)         │  ← Let's Encrypt certs
#    └──────────────┬───────────────┘
#                   │  http://nginx:80 (internal)
#    ┌──────────────▼───────────────┐
#    │  nginx (HTTP, Host routing)  │  ← ushbu compose
#    └─┬─────┬─────┬─────┬──────────┘
#      │     │     │     │
#   landing admin curator  │
#                          │
#                  ┌───────▼──────┐
#                  │   backend    │
#                  └──────────────┘
#
#  Auto-deploy: Watchtower watches GHCR for new images and
#  restarts containers (except caddy, which is pinned).
#
#  How to deploy a new version:
#    git push origin main
#    → GH Actions builds 4 images
#    → Watchtower (5 min) pulls new images, restarts containers
#    → Users see new version
#
#  This file does NOT use `build:`. Images are prebuilt by
#  GitHub Actions (.github/workflows/build.yml) and pulled from
#  ghcr.io/setdarovdev/najot-nur-*.
# ════════════════════════════════════════════════════════════════

name: notiqai

services:
  # ─────────────────────────────────────────────────────────────
  #  PostgreSQL — primary database
  # ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: notiq_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-notiq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-notiqai}
      PGDATA: /var/lib/postgresql/data/pgdata
    expose:
      - "5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-notiq} -d ${POSTGRES_DB:-notiqai}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 384M
    networks:
      - notiq
    labels:
      com.centurylinklabs.watchtower.enable: "true"

  # ─────────────────────────────────────────────────────────────
  #  Redis — cache + rate-limit store
  # ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: notiq_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "192mb", "--maxmemory-policy", "allkeys-lru"]
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 192M
    networks:
      - notiq
    labels:
      com.centurylinklabs.watchtower.enable: "true"

  # ─────────────────────────────────────────────────────────────
  #  Backend — FastAPI + gunicorn (prebuilt image from GHCR)
  # ─────────────────────────────────────────────────────────────
  backend:
    image: ghcr.io/setdarovdev/najot-nur-backend:${IMAGE_TAG:-latest}
    container_name: notiq_backend
    restart: unless-stopped
    pull_policy: always
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-notiq}:${POSTGRES_PASSWORD:?required}@postgres:5432/${POSTGRES_DB:-notiqai}
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
      DEBUG: "false"
      LOCAL_MEDIA_DIR: /app/media
    expose:
      - "8000"
    volumes:
      - media:/app/media
      # FCM service-account JSON lives on the host (gitignored, not baked into
      # the image). Mounted read-only so FCM_SERVICE_ACCOUNT_PATH resolves.
      - ./secrets:/app/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - notiq
    labels:
      com.centurylinklabs.watchtower.enable: "true"

  # ─────────────────────────────────────────────────────────────
  #  Admin SPA — React + Vite (prebuilt image from GHCR)
  # ─────────────────────────────────────────────────────────────
  admin:
    image: ghcr.io/setdarovdev/najot-nur-admin:${IMAGE_TAG:-latest}
    container_name: notiq_admin
    restart: unless-stopped
    pull_policy: always
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - notiq
    labels:
      com.centurylinklabs.watchtower.enable: "true"

  # ─────────────────────────────────────────────────────────────
  #  Curator SPA — React + Vite (prebuilt image from GHCR)
  # ─────────────────────────────────────────────────────────────
  curator:
    image: ghcr.io/setdarovdev/najot-nur-curator:${IMAGE_TAG:-latest}
    container_name: notiq_curator
    restart: unless-stopped
    pull_policy: always
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - notiq
    labels:
      com.centurylinklabs.watchtower.enable: "true"

  # ─────────────────────────────────────────────────────────────
  #  Landing SPA — public marketing page (prebuilt image from GHCR)
  # ─────────────────────────────────────────────────────────────
  landing:
    image: ghcr.io/setdarovdev/najot-nur-landing:${IMAGE_TAG:-latest}
    container_name: notiq_landing
    restart: unless-stopped
    pull_policy: always
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 32M
    networks:
      - notiq
    labels:
      com.centurylinklabs.watchtower.enable: "true"

  # ─────────────────────────────────────────────────────────────
  #  Nginx — internal Host-based routing.
  #  Receives requests from Caddy (via internal Docker network on
  #  port 80) and forwards to the right service based on the
  #  Host header. NOT exposed to the public internet.
  # ─────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: notiq_nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      admin:
        condition: service_healthy
      curator:
        condition: service_healthy
      landing:
        condition: service_healthy
    expose:
      - "80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - media:/var/www/media:ro
      - nginx-cache:/var/cache/nginx
      - nginx-logs:/var/log/nginx
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - notiq
    # nginx image is official, no need to update via watchtower
    labels:
      com.centurylinklabs.watchtower.enable: "false"

  # ─────────────────────────────────────────────────────────────
  #  Caddy — public entry point. Auto-HTTPS via Let's Encrypt.
  #  Listens on :80 and :443, forwards plain HTTP to nginx:8080
  #  on the host (which is nginx container's :80).
  # ─────────────────────────────────────────────────────────────
  caddy:
    image: caddy:2.8-alpine
    container_name: notiq_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data   # certs + ACME account
      - caddy_config:/config
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:2019/config/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - notiq
    # Pin caddy version, never auto-update
    labels:
      com.centurylinklabs.watchtower.enable: "false"

  # Watchtower olib tashlandi. Deploy endi to'liq GitHub Actions'dagi
  # SSH deploy step orqali amalga oshiriladi (.github/workflows/build.yml):
  # image'lar quriladi → GHCR ga push → SSH orqali `compose pull && up -d`.
  # Konteynerlar `pull_policy: always` bilan har deployda yangi image tortadi.

  # ─────────────────────────────────────────────────────────────
  #  Prometheus — metrics collection
  # ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: notiq_prometheus
    restart: unless-stopped
    expose:
      - "9090"
    volumes:
      - ./deploy/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - notiq
    labels:
      com.centurylinklabs.watchtower.enable: "false"

  # ─────────────────────────────────────────────────────────────
  #  Grafana — dashboards & visualization
  # ─────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    container_name: notiq_grafana
    restart: unless-stopped
    environment:
      GF_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-notiqai_grafana}
    expose:
      - "3000"
    volumes:
      - ./deploy/monitoring/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./deploy/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - notiq
    labels:
      com.centurylinklabs.watchtower.enable: "false"

  # ─────────────────────────────────────────────────────────────
  #  Loki — log aggregation
  # ─────────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.1.0
    container_name: notiq_loki
    restart: unless-stopped
    expose:
      - "3100"
    volumes:
      - ./deploy/monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - notiq
    labels:
      com.centurylinklabs.watchtower.enable: "false"

  # ─────────────────────────────────────────────────────────────
  #  Promtail — log shipper (Docker logs → Loki)
  # ─────────────────────────────────────────────────────────────
  promtail:
    image: grafana/promtail:3.1.0
    container_name: notiq_promtail
    restart: unless-stopped
    volumes:
      - ./deploy/monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log:/var/log:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - notiq
    labels:
      com.centurylinklabs.watchtower.enable: "false"

  # ─────────────────────────────────────────────────────────────
  #  Postgres Exporter — Prometheus metrics for PostgreSQL
  # ─────────────────────────────────────────────────────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: notiq_postgres_exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-notiq}:${POSTGRES_PASSWORD:?required}@postgres:5432/${POSTGRES_DB:-notiqai}?sslmode=disable"
    expose:
      - "9187"
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - notiq
    labels:
      com.centurylinklabs.watchtower.enable: "false"

  # ─────────────────────────────────────────────────────────────
  #  Redis Exporter — Prometheus metrics for Redis
  # ─────────────────────────────────────────────────────────────
  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    container_name: notiq_redis_exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis://redis:6379"
    expose:
      - "9121"
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 32M
    networks:
      - notiq
    labels:
      com.centurylinklabs.watchtower.enable: "false"

  # ─────────────────────────────────────────────────────────────
  #  Nginx Exporter — Prometheus metrics for Nginx
  # ─────────────────────────────────────────────────────────────
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:v1.3.0
    container_name: notiq_nginx_exporter
    restart: unless-stopped
    command: ["-nginx.scrape-uri", "http://nginx:80/stub_status"]
    expose:
      - "9113"
    depends_on:
      nginx:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 32M
    networks:
      - notiq
    labels:
      com.centurylinklabs.watchtower.enable: "false"

  # ─────────────────────────────────────────────────────────────
  #  Node Exporter — host machine metrics
  # ─────────────────────────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: notiq_node_exporter
    restart: unless-stopped
    expose:
      - "9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - notiq
    labels:
      com.centurylinklabs.watchtower.enable: "false"

volumes:
  postgres-data:
  redis-data:
  media:
  nginx-cache:
  nginx-logs:
  caddy_data:
  caddy_config:
  prometheus-data:
  grafana-data:
  loki-data:

networks:
  notiq:
    driver: bridge
