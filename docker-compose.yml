# ════════════════════════════════════════════════════════════════
#  NotiqAI — PRODUCTION compose (Dokploy, prebuilt images).
#
#  Images are built by GitHub Actions (.github/workflows/build.yml)
#  and published to GitHub Container Registry:
#    ghcr.io/setdarovdev/najot-nur-{backend,admin,curator,landing}
#
#  Dokploy just pulls and runs — no `docker build` here.
#
#  Architecture:
#    ┌──────────────────────────────┐
#    │  Dokploy Traefik (SSL off)   │  ← terminatsiya HTTPS
#    └──────────────┬───────────────┘
#                   │  http://nginx:80
#    ┌──────────────▼───────────────┐
#    │  nginx (HTTP, Host routing)  │  ← ushbu compose
#    └─┬─────┬─────┬─────┬──────────┘
#      │     │     │     │
#   landing admin curator  │
#                          │
#                  ┌───────▼──────┐
#                  │   backend    │
#                  └──────────────┘
#
#  Quick start:
#    1. Push to main → GitHub Actions builds & pushes images
#    2. In Dokploy → New → Docker Compose → paste this file
#    3. In Dokploy's "Domains" tab add 4 hostnames, ALL pointing
#       to the `nginx` service on port 80
#    4. Fill env vars (see .env.production.example)
#    5. Deploy. Traefik issues Let's Encrypt certs automatically.
#
#  For local development with hot-reload, use docker-compose.local.yml
#  (it overrides images with `build:` directives).
# ════════════════════════════════════════════════════════════════

name: notiqai

# ─── Pin image tag to commit SHA via :latest fallback ─────────
# Dokploy can override this with the IMAGE_TAG env var if needed.
x-image-tag: &image_tag ${IMAGE_TAG:-latest}

services:
  # ─────────────────────────────────────────────────────────────
  #  PostgreSQL — primary database
  # ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: notiq_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-notiq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-notiqai}
      PGDATA: /var/lib/postgresql/data/pgdata
    expose:
      - "5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-notiq} -d ${POSTGRES_DB:-notiqai}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 384M
    networks:
      - notiq

  # ─────────────────────────────────────────────────────────────
  #  Redis — cache + rate-limit store
  # ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: notiq_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "192mb", "--maxmemory-policy", "allkeys-lru"]
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 192M
    networks:
      - notiq

  # ─────────────────────────────────────────────────────────────
  #  Backend — FastAPI + gunicorn (prebuilt image from GHCR)
  # ─────────────────────────────────────────────────────────────
  backend:
    image: ghcr.io/setdarovdev/najot-nur-backend:${IMAGE_TAG:-latest}
    container_name: notiq_backend
    restart: unless-stopped
    pull_policy: always
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-notiq}:${POSTGRES_PASSWORD:?required}@postgres:5432/${POSTGRES_DB:-notiqai}
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
      DEBUG: "false"
      LOCAL_MEDIA_DIR: /app/media
    expose:
      - "8000"
    volumes:
      - media:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - notiq

  # ─────────────────────────────────────────────────────────────
  #  Admin SPA — React + Vite (prebuilt image from GHCR)
  # ─────────────────────────────────────────────────────────────
  admin:
    image: ghcr.io/setdarovdev/najot-nur-admin:${IMAGE_TAG:-latest}
    container_name: notiq_admin
    restart: unless-stopped
    pull_policy: always
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - notiq

  # ─────────────────────────────────────────────────────────────
  #  Curator SPA — React + Vite (prebuilt image from GHCR)
  # ─────────────────────────────────────────────────────────────
  curator:
    image: ghcr.io/setdarovdev/najot-nur-curator:${IMAGE_TAG:-latest}
    container_name: notiq_curator
    restart: unless-stopped
    pull_policy: always
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - notiq

  # ─────────────────────────────────────────────────────────────
  #  Landing SPA — public marketing page (prebuilt image from GHCR)
  # ─────────────────────────────────────────────────────────────
  landing:
    image: ghcr.io/setdarovdev/najot-nur-landing:${IMAGE_TAG:-latest}
    container_name: notiq_landing
    restart: unless-stopped
    pull_policy: always
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 32M
    networks:
      - notiq

  # ─────────────────────────────────────────────────────────────
  #  Nginx — single public entry point.
  #  Listens ONLY on :80 (HTTP). Dokploy Traefik terminates HTTPS
  #  in front of us, so nginx does NOT need ssl_certificate files.
  #
  #  All 4 subdomains from Dokploy point to THIS service.
  #  Routing is by `Host` header → correct upstream container.
  # ─────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: notiq_nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      admin:
        condition: service_healthy
      curator:
        condition: service_healthy
      landing:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - media:/var/www/media:ro
      - nginx-cache:/var/cache/nginx
      - nginx-logs:/var/log/nginx
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - notiq

volumes:
  postgres-data:
  redis-data:
  media:
  nginx-cache:
  nginx-logs:

networks:
  notiq:
    driver: bridge
