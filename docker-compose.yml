# ════════════════════════════════════════════════════════════════
#  NotiqAI — local development stack
#  Usage:  docker compose up -d
# ════════════════════════════════════════════════════════════════
services:
  postgres:
    image: postgres:16-alpine
    container_name: notiq_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-notiq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-notiq_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-notiqai}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-notiq} -d ${POSTGRES_DB:-notiqai}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: notiq_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6382:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: notiq_backend
    restart: unless-stopped
    env_file: .env
    environment:
      # inside the compose network we reach services by name
      POSTGRES_HOST: postgres
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-notiq}:${POSTGRES_PASSWORD:-notiq_dev_password}@postgres:5432/${POSTGRES_DB:-notiqai}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - media:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade heads &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: notiq_admin
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:${BACKEND_PORT:-8000}/api/v1
    ports:
      - "5173:5173"
    volumes:
      - ./admin:/app
      - /app/node_modules
    depends_on:
      - backend
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]

  curator:
    build:
      context: ./curator
      dockerfile: Dockerfile
    container_name: notiq_curator
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:${BACKEND_PORT:-8000}/api/v1
    ports:
      - "5174:5174"
    volumes:
      - ./curator:/app
      - /app/node_modules
    depends_on:
      - backend
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]

  landing:
    build:
      context: ./landing
      dockerfile: Dockerfile
    container_name: notiq_landing
    restart: unless-stopped
    ports:
      - "5175:5175"
    volumes:
      - ./landing:/app
      - /app/node_modules
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]

volumes:
  postgres-data:
  redis-data:
  media:
