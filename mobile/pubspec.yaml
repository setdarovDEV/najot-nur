name: notiqai
description: "NotiqAI — Najot Nur notiqlik mahorati ilovasi"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.6.2

  # Networking
  dio: ^5.7.0
  web_socket_channel: ^3.0.1

  # Local storage
  shared_preferences: ^2.3.3

  # External links (call, email, telegram, maps)
  url_launcher: ^6.3.1

  # Audio playback (audiokitob)
  just_audio: ^0.9.42
  audio_service: ^0.18.16
  audio_session: ^0.1.25

  # Audio recording (nutq / talaffuz testlari → server-side STT)
  record: ^5.1.2
  path_provider: ^2.1.4

  # Audio file picker (device faylidan audio yuklash)
  file_picker: ^8.1.2

  # Typography (Neue Haas Grotesk fallback)
  google_fonts: ^6.2.1

  # Security subsystem
  permission_handler: ^11.3.1
  device_info_plus: ^10.1.2
  uuid: ^4.5.1
  package_info_plus: ^8.0.2

  # Push notifications
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

# record 5.2.1 pulls record_platform_interface 1.6.0 but resolves the unused
# Linux impl to record_linux 0.7.2, which targets the old interface and breaks
# the release compile. Pin the Linux impl to a version matching the interface
# (we only ship Android/iOS — this just keeps the federated set consistent).
dependency_overrides:
  record_linux: 1.3.1

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
